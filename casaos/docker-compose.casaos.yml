services:
  michi-micro-server:
    image: pitydah/michi-micro-server:latest
    container_name: michi-micro-server
    ports:
      - "8096:8096"
    volumes:
      - ${CONFIG_PATH}:/config
      - ${CACHE_PATH}:/cache
      - ${MUSIC_PATH}:/music
    environment:
      - TZ=${TZ}
      - MICHI_PORT=8096
      - MICHI_MUSIC_PATH=/music
      - MICHI_CONFIG_PATH=/config
      - MICHI_CACHE_PATH=/cache
      - MICHI_DATABASE=sqlite:///config/michi.db
    restart: unless-stopped

x-casaos:
  architectures:
    - amd64
    - arm64
  main_app: michi-micro-server
  author: pitydah
  category: music
  description:
    en_us: Lightweight, robust home music server. Stream your local music library over your home network or Tailscale.
  developer: pitydah
  icon: https://raw.githubusercontent.com/pitydah/michi-micro-server/main/docs/icon.png
  screenshot_link:
    - https://raw.githubusercontent.com/pitydah/michi-micro-server/main/docs/screenshot.png
  tagline:
    en_us: Your music, streamed simply.
  thumbnail: ""
  title:
    en_us: Michi Micro Server
  index: /
  port_map: "8096"
